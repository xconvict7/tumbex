<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumbex Pro - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg: #05080d; --card: #111827; --primary: #3b82f6; --success: #22c55e; --text-dim: #94a3b8; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { padding: 25px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--primary); }

        /* Wallet Section */
        .balance-card { margin: 0 20px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 35px 25px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; }
        .bal-amt { font-size: 42px; font-weight: 800; margin: 10px 0; letter-spacing: -1px; }

        /* Task Page Styling */
        .screen { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .section-title { font-size: 18px; font-weight: 700; margin: 20px 0 15px; display: flex; align-items: center; gap: 10px; }

        /* Task Cards */
        .task-item { background: var(--card); padding: 20px; border-radius: 24px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .task-info h4 { margin: 0; font-size: 14px; color: #fff; }
        .task-info p { margin: 5px 0 0; font-size: 12px; color: var(--primary); font-weight: 800; }
        .v-btn { background: var(--success); color: white; border: none; padding: 12px 20px; border-radius: 14px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .v-btn:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; }

        /* Payout List */
        .method { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .method i { font-size: 20px; color: var(--primary); }

        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e293b; }
        .nav-item { color: #475569; text-align: center; font-size: 11px; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { display: block; font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="screen active-screen">
        <div class="header">
            <div class="logo">TUMB<span>EX</span></div>
            <i class="fas fa-user-circle" style="font-size: 28px; color: #334155;"></i>
        </div>
        <div class="balance-card">
            <div style="color: var(--text-dim); font-size: 14px;">Current Earnings</div>
            <div class="bal-amt">₦ <span id="main-bal">58,000</span>.00</div>
            <div style="font-size: 12px; color: var(--success); font-weight: 700;"><i class="fas fa-shield-check"></i> Account Verified</div>
        </div>
        <div style="padding: 20px;">
            <div class="method" onclick="tab('tasks', 't-nav')">
                <i class="fas fa-tasks"></i>
                <div style="flex:1"><strong>Available Tasks</strong><br><small>6 new tasks ready</small></div>
                <i class="fas fa-chevron-right" style="font-size:12px; color:#334155"></i>
            </div>
        </div>
    </div>

    <div id="tasks" class="screen">
        <div class="section-title"><i class="fas fa-bolt" style="color:#eab308"></i> Daily Assignments</div>
        <div id="task-list"></div>
    </div>

    <div id="payout" class="screen">
        <div class="section-title">Withdrawal Methods</div>
        <div class="method"><i class="fas fa-university"></i> <div><strong>Bank Transfer</strong><br><small>Commercial Banks (NGN)</small></div></div>
        <div class="method"><i class="fas fa-wallet"></i> <div><strong>OPay / PalmPay</strong><br><small>Instant Mobile Credit</small></div></div>
        <div class="method"><i class="fas fa-building-columns"></i> <div><strong>Moniepoint</strong><br><small>Business Payout</small></div></div>
        
        <div class="balance-card" style="margin-top: 30px; text-align: left; padding: 25px;">
            <p style="color: var(--text-dim); margin:0">Min. Payout</p>
            <h2 id="min-tag" style="margin: 10px 0;">₦ 135,000</h2>
            <button onclick="payoutClick()" style="width:100%; padding:18px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:800; margin-top:10px;">WITHDRAW FUNDS</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" id="h-nav" onclick="tab('home', 'h-nav')"><i class="fas fa-th-large"></i>Home</div>
        <div class="nav-item" id="t-nav" onclick="tab('tasks', 't-nav')"><i class="fas fa-list-check"></i>Tasks</div>
        <div class="nav-item" id="p-nav" onclick="tab('payout', 'p-nav')"><i class="fas fa-wallet"></i>Payout</div>
    </nav>
</div>

<script>
    let bal = 58000;
    let limit = 135000;
    const ads = ['https://omg10.com/4/10802728', 'https://omg10.com/4/10802075', 'https://omg10.com/4/10939433'];

    const taskData = [
        { id: 1, n: "Watch TikTok Ad", p: 3500 },
        { id: 2, n: "WhatsApp Status Share", p: 2000 },
        { id: 3, n: "Instagram Follow", p: 5000 },
        { id: 4, n: "YouTube Subscription", p: 4000 },
        { id: 5, n: "Telegram Verification", p: 3000 },
        { id: 6, n: "X (Twitter) Retweet", p: 2500 }
    ];

    function renderTasks() {
        let html = "";
        taskData.forEach(t => {
            html += `<div class="task-item">
                <div class="task-info"><h4>${t.n}</h4><p>+₦${t.p.toLocaleString()}</p></div>
                <button id="btn-${t.id}" class="v-btn" onclick="doTask(${t.id}, ${t.p})">Verify</button>
            </div>`;
        });
        document.getElementById('task-list').innerHTML = html;
    }

    function doTask(id, pay) {
        window.open(ads[Math.floor(Math.random()*ads.length)], '_blank');
        bal += pay;
        document.getElementById('main-bal').innerText = bal.toLocaleString();
        
        let btn = document.getElementById('btn-' + id);
        btn.disabled = true;
        let sec = 7200; // 2 Hours
        let timer = setInterval(() => {
            sec--;
            let h = Math.floor(sec/3600);
            let m = Math.floor((sec%3600)/60);
            btn.innerText = h + "h " + m + "m";
            if(sec <= 0) { clearInterval(timer); btn.disabled = false; btn.innerText = "Verify"; }
        }, 1000);
    }

    function payoutClick() {
        window.open(ads[0], '_blank');
        limit += 15000;
        document.getElementById('min-tag').innerText = "₦ " + limit.toLocaleString();
        alert("Verification Required: Complete more tasks to reach the updated threshold of ₦" + limit.toLocaleString());
    }

    function tab(id, nav) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(nav).classList.add('active');
    }

    renderTasks();
</script>

</body>
    </html>
